<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data: blob:; img-src 'self' data:;">
    <link rel="icon" type="image/svg+xml" href="/dms.svg" />
    <title>SAP DMS Client</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "72", Arial, sans-serif;
        background-color: #1D2329;
        color: #F5F6F7;
        overflow: hidden;
      }
      #root {
        height: 100vh;
        width: 100vw;
      }
      /* Custom scrollbar — SAP Horizon dark mode */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #23262C;
      }
      ::-webkit-scrollbar-thumb {
        background: #3F444B;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #56657A;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.jsx"></script>
  </body>
</html>
